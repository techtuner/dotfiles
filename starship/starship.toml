command_timeout = 1000

add_newline = true

format = """
[Ôò¡ÔöÇ](color2)\
    [ÒÇÉ](color7)\
      $username \
      [@](color7) \
       $localip\
      $directory\      
    [ÒÇæ](color7)
[Ôò░ÔöÇ](color2)\
    $git_branch\
    $git_status\
    $package\
    $python\
    $nodejs\
    $os\ 
    $rust\ 
    $golang\ 
    $c\ 
    $time\
    $shell"""

palette = "pywal"

[palettes.pywal]
color0 = "#191C22"
color1 = "#81A1C1"
color2 = "#8FBCBB"
color3 = "#BF616A"
color4 = "#B48EAD"
color5 = "#A3BE8C"
color6 = "#4C566A"
color7 = "#ECEFF4"
color8 = "#EBCB8B"

[memory_usage]
disabled = false
symbol = "´íÜ "
threshold = -1
format = " [$symbol$ram](color1)"


[username]
show_always = true
format = "[$user](color1)"

[hostname]
ssh_only = false
format = "[$hostname](color1)"
disabled = false

[localip]
ssh_only = false
format = '[$localipv4](bold green) '
disabled = false


#[custom.docker]
#command = "echo ' ´îê '"
#files = ["Dockerfile", 'docker-compose.yml', "docker-compose.yaml"]
#when = """ comand -v docker &> /dev/null; exit (echo $?); """
#format = " [$output](color7)"

[character]
success_symbol = " [$shell\\$](color7)"
error_symbol = " [$shellÔ£û](color7)"

[shell]
powershell_indicator = "´æá_"
bash_indicator = "¯»è"
disabled = false


[time]
disabled = false
time_format = "%T"
format = "[ ´Çù$time](color5)"
use_12hr = true

[directory]
disabled = false
read_only = " ´á¢"
truncation_length = 4
truncate_to_repo = false
format = "[$read_only](color4)[$path](color4) "
home_symbol = "´Çò"

[directory.substitutions]
"~" = "´Çò"

[cmd_duration]
disabled = false
min_time = 2000
show_milliseconds = true
show_notifications = false
min_time_to_notify = 45_000
format = "[ ´¿Ü$duration](color3) "

[git_status]
stashed = "´Ç£ \\(${count}\\) "
ahead = "´▓ù ${count}"
behind = "´▓ö ${count}"
diverged = "´ğí ${ahead_count} ${behind_count}"
conflicted = "´Çñ${count}"
deleted = " [´Çı${count}](color3)"
renamed = "´½Ğ${count}"
modified = "[ ´ÉÇ \\(${count}\\) ](color3)"
staged = " [´Çî ${count}](color3)"
untracked = " ´ÉÄ \\(${count}\\)"
format = "([$all_status$ahead_behind](color3)) "

[git_branch]
symbol = "´Şí "
format = "[$symbol$branch](color7)"

[package]
symbol = "´Æç "
display_private = true
version_format = "v${raw}"
format = "[$symbol$version](color4)"

#=== languages ===

[nodejs]
symbol = " ´óİ "
format = "[$symbol($version)](color7)"

[python]
symbol = " ¯İå "
pyenv_prefix = 'pyenv '
python_binary = "python"
format = '[$symbol$pyenv_prefix$version(\($virtualenv\))](color7)'

[c]
format = '\[[$symbol($version(-$name))]($style)\]'

[golang]
format = '\[[$symbol($version)]($style)\]'

[os]
format = '\[[$symbol]($style)\]'

[rust]
format = '\[[$symbol($version)]($style)\]'
style = "bold green"
