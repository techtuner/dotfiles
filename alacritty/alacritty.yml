import:
  # - ~/.config/alacritty/hardhacker.yml
  - ~/.config/alacritty/gruvbox.yml
env:
  TERM: xterm-256color
window:
  decoration: buttonless
  opacity: 0.8
  dynamic_padding: false
  padding:
    x: 12
    y: 12

font:
  normal:
    family: "Dank Mono"
    style: Medium
  italic:
    family: "Dank Mono"
    style: Medium Italic
  bold:
    family: "Dank Mono"
    style: Heavy
  bold_italic:
    family: "Dank Mono"
    style: Heavy Italic
  size: 16.0
live_config_reload: true
