window:
  opacity: 0.2
  decorations : None
  startup_mode : Maximized
  gtk_theme_variant: None
  padding:
    x: 5
    y: 5
  class:
    instance: Alacritty
    general: Alacritty

scrolling:
  history: 1000
  multiplier: 3


font:
  normal:
    family: FiraCode NF
    style: Medium
  bold:
    family: FiraCode NF
    style: Bold
  italic:
    family: FiraCode NF
    style: MediumItalic
  bold_italic:
    family: FiraCode NF
    style: BoldItalic
  size: 16
draw_bold_text_with_bright_colors: false
cursor:
  style:
    shape: Beam
    blinking: Always
    blink-interval: 1000
live_config_reload: true
colors:
  # Kanagawa Alacritty Colors
colors:
  primary:
    background: '0x1f1f28'
    foreground: '0xdcd7ba'

  normal:
    black:   '0x090618'
    red:     '0xc34043'
    green:   '0x76946a'
    yellow:  '0xc0a36e'
    blue:    '0x7e9cd8'
    magenta: '0x957fb8'
    cyan:    '0x6a9589'
    white:   '0xc8c093'

  bright:
    black:   '0x727169'
    red:     '0xe82424'
    green:   '0x98bb6c'
    yellow:  '0xe6c384'
    blue:    '0x7fb4ca'
    magenta: '0x938aa9'
    cyan:    '0x7aa89f'
    white:   '0xdcd7ba'

  selection:
    background: '0x2d4f67'
    foreground: '0xc8c093'

  indexed_colors:
    - { index: 16, color: '0xffa066' }
    - { index: 17, color: '0xff5d62' }
  transparent_background_color : true
key_bindings:
  - { key: Return, mods: Super|Shift, action: SpawnNewInstance }
