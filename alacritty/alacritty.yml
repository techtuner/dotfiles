import:
  - "~/.config/alacritty/nord.toml"
env:
  TERM: xterm-256color
window:
  decoration: buttonless
  opacity: 1.0
  dynamic_padding: false
  padding:
    x: 12
    y: 12

font:
  normal:
    family: "FiraCode Nerd Font"
    style: Medium
  italic:
    family: "FiraCode Nerd Font"
    style: Medium Italic
  bold:
    family: "FiraCode Nerd Font"
    style: Heavy
  bold_italic:
    family: "FiraCode Nerd Font"
    style: Heavy Italic
  size: 16.0
live_config_reload: true
