window:
  padding:
    x: 5
    y: 5
  class:
    instance: Alacritty
    general: Alacritty

scrolling:
  history: 1000
  multiplier: 3

background_opacity: 0.85

font:
  normal:
    family: JetBrains Mono Nerd Font
    style: Medium
  bold:
    family: JetBrains Mono Nerd Font
    style : Bold
  italic:
    family: JetBrains Mono Nerd Font
    style : MediumItalic
  bold_italic:
    family: JetBrains Mono Nerd Font
    style:BoldItalic
  size : 14
draw_bold_text_with_bright_colors: true
cursor:
  style:
    shape : Beam
    blinking: Always
    blink-interval : 1000
live_config_reload : true
colors:
  # Default colors
  primary:
    background: '0x121212'
    foreground: '0xd0d0d0'

  # Normal colors
  normal:
    black:   '0x282828'
    red:     '0xd71a1a'
    green:   '0x57ba37'
    yellow:  '0xf0d50c'
    blue:    '0x91aadf'
    magenta: '0xcf73e6'
    cyan:    '0xb7cbf4'
    white:   '0xdedede'

  # Bright colors
  bright:
    black:   '0x666666'
    red:     '0xff0000'
    green:   '0xd8fa3b'
    yellow:  '0xe7c547'
    blue:    '0xb7cbf4'
    magenta: '0xb77ee0'
    cyan:    '0xa9c1de'
    white:   '0xeeeeee'
key_bindings:
- {key: Return , mods: Super|Shift, action : SpawnNewInstance }
