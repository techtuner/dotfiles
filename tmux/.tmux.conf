# Setting a New prefix for tmux
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Split using using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %


# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind-key -n S-Left swap-window -t -1
bind-key -n S-Right swap-window -t +1
bind-key n new-window
bind-key -r C-Right next-window
bind-key -r C-Left previous-window
bind-key -r o last-window
bind -r C-h resize-pane -L 3
bind-key r command-prompt -I "#W" "rename-window '%%'"
bind -r C-j resize-pane -D 3
bind -r C-k resize-pane -U 3
bind -r C-l resize-pane -R 3

# Enable Mouse Mode
set -g mouse on

# Source File Keybind
bind R source-file ~/.tmux.conf \; display-message "Config reloaded.."

# Stop renaming of windows
set-option -g allow-rename on
set-window-option -g automatic-rename on
set -g @continuum-restore 'on'

set -g status-right ' <techtuner> '
set -g status-right-length 20
set -g status-bg default
set -g status-position top
set -g status-interval 1
set -g status-left ""
set -g mode-style "fg=#7aa2f7,bg=#15161e"

set -g message-style "fg=#7aa2f7,bg=#15161e"
set -g message-command-style "fg=#7aa2f7,bg=#15161e"

set -g pane-border-style "fg=#15161e"
set -g pane-active-border-style "fg=#7aa2f7"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=#7aa2f7,bg=#16161e"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#15161e,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#16161e,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#16161e] #{prefix_highlight} #[fg=#15161e,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#15161e] %Y-%m-%d  %I:%M %p #[fg=#7aa2f7,bg=#15161e,nobold,nounderscore,noitalics]#[fg=#15161e,bg=#7aa2f7,bold] #h "
if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
  set -g status-right "#[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#16161e] #{prefix_highlight} #[fg=#15161e,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#15161e] %Y-%m-%d  %H:%M #[fg=#7aa2f7,bg=#15161e,nobold,nounderscore,noitalics]#[fg=#15161e,bg=#7aa2f7,bold] #h "
}

setw -g window-status-activity-style "underscore,fg=#a9b1d6,bg=#16161e"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a9b1d6,bg=#16161e"
setw -g window-status-format "#[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#16161e,bg=#15161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#15161e,bold] #I  #W #F #[fg=#15161e,bg=#16161e,nobold,nounderscore,noitalics]"

# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "#[fg=#e0af68]#[bg=#16161e]#[fg=#16161e]#[bg=#e0af68]"
set -g @prefix_highlight_output_suffix ""
set -g base-index 1
setw -g pane-base-index 1

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'