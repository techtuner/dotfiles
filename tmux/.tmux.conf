# Setting a New prefix for tmux
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Split using using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %


# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind-key -n S-Left swap-window -t -1
bind-key -n S-Right swap-window -t +1
bind-key n new-window
bind-key -r C-Right next-window
bind-key -r C-Left previous-window
bind-key -r o last-window
bind -r C-h resize-pane -L 3
bind-key r command-prompt -I "#W" "rename-window '%%'"
bind -r C-j resize-pane -D 3
bind -r C-k resize-pane -U 3
bind -r C-l resize-pane -R 3

# Enable Mouse Mode
set -g mouse on

# Source File Keybind
bind R source-file ~/.tmux.conf \; display-message "Config reloaded.."

# Stop renaming of windows
set-option -g allow-rename off
set-window-option -g automatic-rename off
set -g @continuum-restore 'on'

set -g status-right ' <techtuner> '
set -g status-right-length 20

# Colors (gruvbox dark base16)

# default statusbar colors
# but a shade darker to show remote
set-option -g status-style "fg=#bdae93,bg=#1c1816"

# default window title colors
set-window-option -g window-status-style "fg=#bdae93,bg=default"

# active window title colors
set-window-option -g window-status-current-style "fg=#fabd2f,bg=default"

# pane border
set-option -g pane-border-style "fg=#3c3836"
set-option -g pane-active-border-style "fg=#504945"

# message text
set-option -g message-style "fg=#d5c4a1,bg=#3c3836"

# pane number display
set-option -g display-panes-active-colour "#b8bb26"
set-option -g display-panes-colour "#fabd2f"

# clock
set-window-option -g clock-mode-colour "#b8bb26"

# copy mode highlight
set-window-option -g mode-style "fg=#bdae93,bg=#504945"

# bell
set-window-option -g window-status-bell-style "fg=#3c3836,bg=#fb4934"

set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
